# ─────────────────────────────────────────────────────────────────────────────
# DEPRECATED: This is the legacy proxy worker (imagestro-pacs-proxy).
# It has been replaced by cloudflare/api-gateway-v2/ which uses Hono + TypeScript.
#
# To deploy the new gateway:
#   cd cloudflare/api-gateway-v2 && wrangler deploy
#
# This file is kept temporarily for reference. Remove after full migration.
# ─────────────────────────────────────────────────────────────────────────────
name = "imagestro-pacs-proxy"
main = "worker.js"
compatibility_date = "2026-05-12"
compatibility_flags = ["nodejs_compat"]

# Service Binding to Accession Worker (zero-latency worker-to-worker)
[[services]]
binding = "ACCESSION_WORKER"
service = "accession-worker"

# Routes - bind this worker to specific paths on your Pages domain
# Worker handles:
# - imagestro-pacs.pages.dev/backend-api/*
# - imagestro-pacs.pages.dev/api/*
# - imagestro-pacs.pages.dev/wado-rs/*
# - imagestro-pacs.pages.dev/accession-api/*

# Environment variables
[vars]
BACKEND_URL = "https://dev-pacs-backend.satupintudigital.co.id"
ACCESSION_WORKER_URL = "https://accession-worker.satupintudigital.workers.dev"

# GATEWAY_SHARED_SECRET is set via `wrangler secret put GATEWAY_SHARED_SECRET`

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

