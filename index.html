<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>%VITE_APP_NAME%</title>

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>

<body class="bg-slate-50">
  <div id="root"></div>


  <!-- Production console suppression — runs before module loader so all module-level logs are caught -->
  <script>
    (function() {
      try {
        var host = window.location.hostname;
        var isLocal = host === 'localhost' || host === '127.0.0.1' || host.startsWith('192.168.');
        var debugMode = false;
        try { debugMode = localStorage.getItem('debug_mode') === 'true'; } catch (e) {}
        if (!isLocal && !debugMode) {
          var noop = function() {};
          console.log = noop;
          console.info = noop;
          console.debug = noop;
          // console.warn and console.error stay native
        }
      } catch (e) {}
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
