global
    daemon
    log stdout local0
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy

    # SSL/TLS Configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    ssl-default-server-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-server-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option log-health-checks
    option forwardfor except 127.0.0.0/8
    option redispatch

    timeout connect 5000
    timeout client 50000
    timeout server 50000
    timeout http-request 10s
    timeout http-keep-alive 10s

    retries 3

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    stats auth admin:admin123

frontend dicom_frontend
    mode tcp
    bind *:4242
    option tcplog
    default_backend dicom_backend

frontend http_frontend
    bind *:80
    option httplog

    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection "1; mode=block"

    compression algo gzip
    compression type text/html text/plain text/css application/javascript application/json

    default_backend orthanc_backend

backend dicom_backend
    mode tcp
    balance roundrobin
    option tcp-check
    tcp-check connect port 4242
    server orthanc1 orthanc:4242 check inter 2000 rise 2 fall 3

backend orthanc_backend
    mode http
    balance roundrobin
    option httpchk GET /system
    http-check expect status 200
    cookie SERVERID insert indirect nocache
    server orthanc1 orthanc:8042 check inter 2000 rise 2 fall 3 cookie orthanc1
    timeout server 300s
    timeout connect 10s
