name = "api-gateway-v2"
main = "src/index.ts"
compatibility_date = "2026-05-12"
compatibility_flags = [ "nodejs_compat" ]

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:3000,https://imagestro-pacs.pages.dev,https://mwl.satupintudigital.co.id"
JWT_ALGORITHM = "HS256"
# Backend services via Workers VPC Network (tunnel aizen)
AUTH_SERVICE_URL = "http://auth-service:5000"
PACS_SERVICE_URL = "http://pacs-service:8003"
MASTER_DATA_SERVICE_URL = "http://master-data-service:8002"
ORDER_SERVICE_URL = "http://order-management:8001"
MWL_SERVICE_URL = "http://mwl-writer-secured:8000"
SIMRS_UNIVERSAL_URL = "http://simrs-universal-api:8005"
SATUSEHAT_INTEGRATOR_URL = "http://satusehat-integrator:8081"
KHANZA_API_URL = "http://khanza-api:3000"

# Rate limiting for /auth/login
AUTH_RATE_LIMIT_ENABLED = "true"
AUTH_RATE_LIMIT_WINDOW_SECONDS = "60"
AUTH_RATE_LIMIT_MAX_ATTEMPTS_IP = "10"
AUTH_RATE_LIMIT_MAX_ATTEMPTS_USER = "5"
AUTH_RATE_LIMIT_BLOCK_SECONDS = "300"

[[kv_namespaces]]
binding = "API_CACHE"
id = "19df22b7c1764cb7b091e2ed929df9b4"

[[vpc_networks]]
binding = "BACKBONE"
tunnel_id = "5c496701-6046-410a-a870-f20f096c65e4"
remote = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
