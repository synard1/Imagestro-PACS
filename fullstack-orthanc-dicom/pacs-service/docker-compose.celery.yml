  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pacs-celery-beat
    restart: always
    command: celery -A app.celery_app beat -l info --scheduler celery.beat:PersistentScheduler
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://dicom:E4RMTJiyTmfUwk%2BtztrRKw%3D%3D@dicom-postgres-secured:5432/worklist_db
      - DB_HOST=dicom-postgres-secured
      - DB_PORT=5432
      - DB_NAME=worklist_db
      - DB_USER=dicom
      - DB_PASSWORD=E4RMTJiyTmfUwk+tztrRKw==
      - ORTHANC_PASSWORD=orthanc
      - JWT_SECRET=pacs-secret-key-for-testing-2024
    volumes:
      - ./app:/app/app
      - celery_beat_data:/app/celerybeat-schedule
