  # Celery Worker - FHIR Conversion Queue
  celery-worker-fhir-conversion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pacs-celery-fhir-conversion
    restart: always
    command: celery -A app.celery_app worker -Q fhir_conversion -l info -c 4 -n fhir_conversion@%h
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://dicom:E4RMTJiyTmfUwk%2BtztrRKw%3D%3D@dicom-postgres-secured:5432/worklist_db
      - DB_HOST=dicom-postgres-secured
      - DB_PORT=5432
      - DB_NAME=worklist_db
      - DB_USER=dicom
