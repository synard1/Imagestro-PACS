version: '3.8'

services:
  # Redis - Message Broker & Result Backend
  redis:
    image: redis:7-alpine
    container_name: pacs-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - pacs-network
      - secure-network

  # Celery Worker - Storage Queue
  celery-worker-storage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pacs-celery-storage
    restart: always
    command: celery -A app.celery_app worker -Q storage -l info -c 2 -n storage@%h
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://dicom:E4RMTJiyTmfUwk%2BtztrRKw%3D%3D@dicom-postgres-secured:5432/worklist_db
      - DB_HOST=dicom-postgres-secured
      - DB_PORT=5432
      - DB_NAME=worklist_db
      - DB_USER=dicom
      - DB_PASSWORD=E4RMTJiyTmfUwk+tztrRKw==
      - ORTHANC_PASSWORD=orthanc
      - JWT_SECRET=pacs-secret-key-for-testing-2024
    volumes:
      - ./app:/app/app
      - /var/lib/pacs/storage:/var/lib/pacs/storage
    depends_on:
      - redis
    networks:
      - pacs-network
      - secure-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Worker - Cleanup Queue
  celery-worker-cleanup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pacs-celery-cleanup
    restart: always
    command: celery -A app.celery_app worker -Q cleanup -l info -c 1 -n cleanup@%h
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
