      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    driver: local
  celery_beat_data:
    driver: local

networks:
  pacs-network:
    driver: bridge
  secure-network:
    external: true
    name: fullstack-orthanc-dicom_secure-network
