      - DB_HOST=dicom-postgres-secured
      - DB_PORT=5432
      - DB_NAME=worklist_db
      - DB_USER=dicom
      - DB_PASSWORD=E4RMTJiyTmfUwk+tztrRKw==
      - ORTHANC_PASSWORD=orthanc
      - JWT_SECRET=pacs-secret-key-for-testing-2024
    volumes:
      - ./app:/app/app
      - /var/lib/pacs/storage:/var/lib/pacs/storage
    depends_on:
      - redis
    networks:
      - pacs-network
      - secure-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Worker - Migration Queue
