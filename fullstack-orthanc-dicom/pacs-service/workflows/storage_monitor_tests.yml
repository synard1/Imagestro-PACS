name: Storage Monitor API Tests

on:
  push:
    paths:
      - 'app/api/storage_monitor.py'
      - 'app/services/storage_monitor.py'
      - 'tests/**'
      - 'migrations/**'
  pull_request:
    paths:
      - 'app/api/storage_monitor.py'
      - 'app/services/storage_monitor.py'
      - 'tests/**'
      - 'migrations/**'
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test-storage-monitor:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: pacs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd redis-cli ping
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
        test-type: ['unit', 'integration', 'performance']
        exclude:
          # Exclude performance tests on Python 3.9 due to memory constraints
          - python-version: '3.9'
            test-type: 'performance'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          postgresql-client \
          libpq-dev \
          build-essential \
          python3-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock pytest-asyncio fastapi httpx
        pip install sqlalchemy psycopg2-binary redis
        pip install python-dotenv pydantic
        pip install coverage

    - name: Wait for database
      run: |
        until pg_isready -h localhost -p 5432 -U testuser; do
          echo "Waiting for database..."
          sleep 2
        done

    - name: Create test database
      run: |
        psql -h localhost -U testuser -d postgres -c "CREATE DATABASE pacs_test;"
        psql -h localhost -U testuser -d pacs_test -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"

    - name: Run database migrations
      run: |
        python -c "
        import sys
        sys.path.append('.')
        from app.database import engine
        from sqlalchemy import text
        
        # Run migration files
        import os
        migration_files = [f for f in os.listdir('migrations') if f.endswith('.sql')]
        for migration_file in sorted(migration_files):
            with open(f'migrations/{migration_file}', 'r') as f:
                migration_sql = f.read()
                with engine.connect() as conn:
                    conn.execute(text(migration_sql))
                    conn.commit()
                    print(f'Applied migration: {migration_file}')
        "

    - name: Run unit tests
      if: matrix.test-type == 'unit'
      run: |
        python -m pytest tests/unit/test_storage_monitor_helpers.py -v --cov=app.services.storage_monitor --cov-report=xml --cov-report=term-missing
        python -m pytest tests/test_storage_monitor_api.py -v --cov=app.api.storage_monitor --cov-report=xml --cov-report=term-missing

    - name: Run integration tests
      if: matrix.test-type == 'integration'
      run: |
        python -m pytest tests/integration/test_storage_monitor_integration.py -v --cov=app.services.storage_monitor --cov-report=xml --cov-report=term-missing -m "integration"

    - name: Run performance tests
      if: matrix.test-type == 'performance'
      run: |
        python -m pytest tests/integration/test_storage_monitor_integration.py -v --cov=app.services.storage_monitor --cov-report=xml --cov-report=term-missing -m "performance"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Generate test report
      run: |
        python tests/run_storage_monitor_tests.py --report --coverage

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}-${{ matrix.test-type }}
        path: |
          storage_monitor_test_report.json
          coverage.xml
          htmlcov/

    - name: Comment PR with test results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = 'storage_monitor_test_report.json';
          
          if (fs.existsSync(path)) {
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const summary = report.summary;
            
            let comment = `
            ## Storage Monitor Test Results
            
            **Test Run**: ${{ github.workflow }} on ${{ github.ref }}
            **Python Version**: ${{ matrix.python-version }}
            **Test Type**: ${{ matrix.test-type }}
            
            ### Summary
            - Total Tests: ${summary.total_tests}
            - Passed: ${summary.passed}
            - Failed: ${summary.failed}
            - Skipped: ${summary.skipped}
            - Coverage: ${summary.coverage}%
            
            ### Details
            `;
            
            for (const [test_type, result] of Object.entries(report.test_results)) {
              comment += `
              **${test_type}**: ${result.success ? '✅' : '❌'} (${result.total} tests)
              `;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  test-storage-monitor-full:
    needs: test-storage-monitor
    runs-on: ubuntu-latest
    if: always() # Run even if some tests fail
    
    steps:
    - name: Generate full test report
      run: |
        echo "## Full Storage Monitor Test Report"
        echo "Date: $(date)"
        echo ""
        echo "Matrix Test Results:"
        echo "- Python 3.9: Unit, Integration"
        echo "- Python 3.10: Unit, Integration, Performance"
        echo "- Python 3.11: Unit, Integration, Performance"
        echo ""
        echo "Test Coverage Report:"
        find ./ -name "storage_monitor_test_report.json" -exec cat {} \;
        echo ""
        echo "Coverage Reports:"
        find ./ -name "coverage.xml" -exec echo "Found: {}" \;

    - name: Upload full report
      uses: actions/upload-artifact@v3
      with:
        name: storage-monitor-full-report
        path: |
          storage_monitor_test_report.json
          coverage.xml
          htmlcov/
        retention-days: 30
