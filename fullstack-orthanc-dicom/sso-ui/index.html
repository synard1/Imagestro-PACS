<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Single Sign-On Web UI for DICOM Healthcare System" />
  <meta name="keywords" content="SSO, DICOM, Healthcare, Authentication, Medical Imaging" />
  <meta name="author" content="DICOM Healthcare System" />
  
  <!-- Security headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />

  <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.ico" />
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <title>SSO - DICOM Healthcare System</title>
  
  <!-- Preload critical resources -->
  <link rel="modulepreload" href="/src/main.jsx" />
  
  <!-- Theme color for mobile browsers -->
  <meta name="theme-color" content="#3b82f6" />
  
  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  
  <!-- Manifest for PWA -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Critical CSS for loading state -->
  <style>
    /* Loading spinner styles */
    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      margin-top: 20px;
      text-align: center;
    }
    
    /* Hide loading when app is ready */
    .app-ready .loading-container {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div class="loading-container" id="loading-screen">
    <div>
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading DICOM SSO...</div>
    </div>
  </div>
  
  <!-- Main app container -->
  <div id="root"></div>
  
  <!-- No JavaScript fallback -->
  <noscript>
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
      <h1>JavaScript Required</h1>
      <p>This application requires JavaScript to function properly.</p>
      <p>Please enable JavaScript in your browser and refresh the page.</p>
    </div>
  </noscript>
  
  <!-- Main application script -->
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- Remove loading screen when app is ready -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.body.classList.add('app-ready');
      }, 500);
    });
  </script>
</body>
</html>
